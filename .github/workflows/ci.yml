name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Generate Rust coverage
        if: matrix.os == 'ubuntu-latest'
        run: cargo llvm-cov --workspace --lcov --output-path target/lcov.info
      - name: Upload Rust coverage to Qlty
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        continue-on-error: true
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: target/lcov.info

  web:
    name: web (lint, typecheck, unit, build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec eslint .
      - run: pnpm --filter @harness/web typecheck
      - run: pnpm --filter @harness/web test:coverage
      - name: Upload web coverage to Qlty
        if: github.event_name == 'push'
        continue-on-error: true
        uses: qltysh/qlty-action/coverage@v2
        with:
          oidc: true
          files: apps/web/coverage/lcov.info
          add-prefix: apps/web
      - run: pnpm --filter @harness/web build

  security:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo install cargo-audit --locked
      - run: cargo audit --deny warnings
      - run: pnpm audit --prod

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo build -p harness-server
      - run: pnpm --filter @harness/web build
      - run: pnpm --filter @harness/web exec playwright install --with-deps chromium
      - run: pnpm --filter @harness/web e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
