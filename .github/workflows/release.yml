name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, ext: "" }
          - { os: macos-latest, target: aarch64-apple-darwin, ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, ext: ".exe" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # No .env.local in CI → NEXT_PUBLIC_API_BASE is empty → same-origin fetches.
      - run: pnpm --filter @harness/web build
      - run: cargo build --release -p harness-server --features release-embed
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/harness-dashboard${{ matrix.ext }}" "dist/harness-dashboard-${{ matrix.target }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: harness-dashboard-${{ matrix.target }}
          path: dist/*
